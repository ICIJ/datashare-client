name: Datashare build, tests and docs

on:
  push:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialise Pages deployments. A re-run that only re-runs the deploy job then reuses the
# single artifact built by the storybook job instead of producing a duplicate.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  storybook:
    name: Build Storybook
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.2'
          cache: 'yarn'

      - name: Install dependencies
        run: make install

      - name: Generate doc pages
        run: make doc

      - name: Upload storybook artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: storybook-static

  deploy:
    name: Deploy Storybook to GitHub Pages
    if: github.ref == 'refs/heads/main'
    needs: storybook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy artifact to Github Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.7
        env:
          ES_JAVA_OPTS: -Xms256m -Xmx256m
          discovery.type: single-node
          cluster.name: datashare
          http.compression: false
          http.cors.enabled: true
          http.cors.allow-origin: "*"
          http.cors.allow-methods: OPTIONS, HEAD, GET, POST, PUT, DELETE
          indices.query.bool.max_clause_count: 20000
        options: >-
            --health-cmd "curl -f http://localhost:9200/_cluster/health || exit 1"
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5
        ports:
          - 9200:9200
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.2'
          cache: 'yarn'

      - name: Install dependencies
        run: make install

      - name: Cache Vite/Vitest dep-optimizer
        uses: actions/cache@v4
        with:
          path: node_modules/.vite
          key: vite-deps-${{ runner.os }}-${{ hashFiles('yarn.lock', 'vitest.config.js', 'vite.config.js') }}
          restore-keys: |
            vite-deps-${{ runner.os }}-

      - name: Run unit tests
        run: yarn test:unit --silent --minWorkers 1 --maxWorkers 2
        env:
          VITE_ES_HOST: http://localhost:9200
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Build
        run: make build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.2'
          cache: 'yarn'

      - name: Install dependencies
        run: make install

      - name: Run linter
        run: make lint
